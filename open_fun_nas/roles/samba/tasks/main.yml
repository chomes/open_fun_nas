---
- name: Install samba
  ansible.builtin.apt:
    name: samba
    state: present
    update_cache: true
  retries: 5
- name: Deploy samba config
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    backup: true
    owner: root
    group: root
    mode: "0644"
  register: samba_config
  notify:
    - "samba : Enable samba on firewall"
    - "samba : Restart samba"
